<div id="file-upload-section" class="upload-section">
  <span id="file-upload-title" class="upload-title">{{ 'TICKETS.UPLOAD_ATTACHMENTS' | translate }}</span>
  <p id="file-upload-hint" class="upload-hint">{{ 'TICKETS.UPLOAD_HINT' | translate }}</p>

  <label id="file-upload-browse-label" class="btn-browse">
    <input id="file-upload-input" type="file" multiple [attr.accept]="acceptAttr"
      (change)="onFilesSelected($event)"
      class="visually-hidden-input" />
    {{ 'TICKETS.BROWSE_FILES' | translate }}
  </label>

  @if (files.length) {
    <div id="file-upload-list" class="attachment-list">
      @for (f of files; track $index) {
        <div class="attachment-chip" [attr.id]="'file-upload-chip-' + $index">
          <span class="chip-check" [attr.id]="'file-upload-chip-check-' + $index">&#10003;</span>
          <span class="chip-name" [attr.id]="'file-upload-chip-name-' + $index">{{ f.name }}</span>
          <button type="button" class="chip-remove" [attr.id]="'file-upload-chip-remove-' + $index" (click)="removeFile($index)">&times;</button>
        </div>
      }
    </div>
  }

  @if (errors().length) {
    <ul id="file-upload-errors" class="upload-errors" role="alert">
      @for (err of errors(); track $index) {
        <li class="upload-error">{{ err }}</li>
      }
    </ul>
  }
</div>
