@if (open()) {
  <div id="confirm-dialog-overlay" class="overlay" (click)="onCancel()">
    <div id="confirm-dialog-card" class="dialog-card" (click)="$event.stopPropagation()">

      <!-- Header: close + icon on same line -->
      <div id="confirm-dialog-header" class="dialog-header">
         <div id="confirm-dialog-info-icon" class="info-icon">
          <svg id="confirm-dialog-info-icon-svg" fill="#000000" width="800px" height="800px" viewBox="-1 0 19 19" xmlns="http://www.w3.org/2000/svg" class="cf-icon-svg"><path id="confirm-dialog-info-icon-path" d="M16.417 9.583A7.917 7.917 0 1 1 8.5 1.666a7.917 7.917 0 0 1 7.917 7.917zM5.85 3.309a6.833 6.833 0 1 0 2.65-.534 6.787 6.787 0 0 0-2.65.534zm2.654 1.336A1.136 1.136 0 1 1 7.37 5.78a1.136 1.136 0 0 1 1.135-1.136zm.792 9.223V8.665a.792.792 0 1 0-1.583 0v5.203a.792.792 0 0 0 1.583 0z"/></svg>
        </div>
        <button id="confirm-dialog-btn-close" class="close-btn" (click)="onCancel()" [attr.aria-label]="'COMMON.CLOSE' | translate">&#x2715;</button>

      </div>

      <!-- Body -->
      <div id="confirm-dialog-body" class="dialog-body">
        <h3 id="confirm-dialog-title" class="dialog-title">{{ title() || ('CONFIRM_DIALOG.TITLE' | translate) }}</h3>
        <p id="confirm-dialog-message" class="dialog-message">{{ message() || ('CONFIRM_DIALOG.MESSAGE' | translate) }}</p>
      </div>

      <!-- Actions -->
      <div id="confirm-dialog-actions" class="dialog-actions">
        <button id="confirm-dialog-btn-confirm" class="btn-confirm" (click)="onConfirm()">{{ confirmText() || ('COMMON.SAVE' | translate) }}</button>
        <button id="confirm-dialog-btn-cancel" class="btn-cancel" (click)="onCancel()">{{ cancelText() || ('COMMON.CANCEL' | translate) }}</button>
      </div>

    </div>
  </div>
}
