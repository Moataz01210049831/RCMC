<header id="app-header" class="app-header">

  <!-- Right: logo (first child → right in RTL) -->
  <div id="header-right" class="header-right">
    <img id="header-logo" [src]="config.headerLogo" [alt]="config.appName" class="header-logo" (click)="goToDashboard()" style="cursor: pointer;" />
  </div>

  <!-- Left: account + notification (second child → left in RTL) -->
  <div id="header-left" class="header-left">

    <!-- Notification bell -->
    <button id="header-notification-btn" class="icon-btn" aria-label="الإشعارات">
      <svg id="header-notification-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2">
        <path id="header-notification-icon-bell" d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path id="header-notification-icon-clapper" d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </button>

    <div id="header-separator" class="separator"></div>

    <!-- Account dropdown -->
    <div id="header-account" class="account" (click)="toggleDropdown()">
       <div id="header-avatar" class="avatar">{{ user.initials }}</div>

      <div id="header-user-info" class="user-info">
        <span id="header-user-name" class="user-name">{{ user.name }}</span>
        <span id="header-user-role" class="user-role">{{ user.role }}</span>
      </div>


      <svg id="header-chevron" class="chevron" [class.open]="dropdownOpen()" xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline id="header-chevron-polyline" points="6 9 12 15 18 9"/>
      </svg>

      @if (dropdownOpen()) {
        <div id="header-dropdown" class="dropdown" (click)="$event.stopPropagation()">
          <button id="header-dropdown-change-password" class="dropdown-item" (click)="changePassword()">
            <svg id="header-change-password-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <rect id="header-change-password-icon-rect" x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path id="header-change-password-icon-path" d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            تغيير كلمة المرور
          </button>
          <button id="header-dropdown-logout" class="dropdown-item logout" (click)="logout()">
            <svg id="header-logout-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path id="header-logout-icon-path" d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline id="header-logout-icon-polyline" points="16 17 21 12 16 7"/>
              <line id="header-logout-icon-line" x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            تسجيل الخروج
          </button>
        </div>
      }
    </div>

  </div>
</header>
