<div class="ss-container">

  <!-- Trigger -->
  <div class="ss-trigger"
    [class.open]="isOpen"
    [class.invalid]="invalid"
    [class.has-value]="selectedValue"
    (click)="open()">

    @if (selectedValue) {
      <span class="ss-value">{{ selectedLabel }}</span>
      <button type="button" class="ss-clear" (click)="clear($event)">×</button>
    } @else {
      <span class="ss-placeholder">{{ placeholder }}</span>
    }

    <svg class="ss-arrow" [class.rotated]="isOpen"
      xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
      fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </div>

  <!-- Dropdown -->
  @if (isOpen) {
    <div class="ss-dropdown">
      <div class="ss-search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" class="ss-search-icon">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          class="ss-search"
          [(ngModel)]="searchText"
          [ngModelOptions]="{standalone: true}"
          placeholder="بحث..."
          (click)="$event.stopPropagation()"
          autofocus />
      </div>

      <ul class="ss-list">
        @for (item of filtered; track item.value) {
          <li class="ss-item"
            [class.selected]="item.value === selectedValue"
            (click)="select(item)">
            {{ item.name }}
          </li>
        } @empty {
          <li class="ss-empty">لا توجد نتائج</li>
        }
      </ul>
    </div>
  }

</div>
