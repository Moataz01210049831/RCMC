<div id="ss-container" class="ss-container">

  <!-- Trigger -->
  <div id="ss-trigger" class="ss-trigger"
    [class.open]="isOpen"
    [class.invalid]="invalid"
    [class.has-value]="selectedValue"
    (click)="open()">

    @if (selectedValue) {
      <span id="ss-value" class="ss-value">{{ selectedLabel }}</span>
      <button id="ss-clear-btn" type="button" class="ss-clear" (click)="clear($event)">×</button>
    } @else {
      <span id="ss-placeholder" class="ss-placeholder">{{ placeholder || ('SEARCHABLE_SELECT.CHOOSE' | translate) }}</span>
    }

    <svg id="ss-arrow" class="ss-arrow" [class.rotated]="isOpen"
      xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
      fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline id="ss-arrow-polyline" points="6 9 12 15 18 9"/>
    </svg>
  </div>

  <!-- Dropdown -->
  @if (isOpen) {
    <div id="ss-dropdown" class="ss-dropdown">
      <div id="ss-search-wrap" class="ss-search-wrap">
        <svg id="ss-search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" class="ss-search-icon">
          <circle id="ss-search-icon-circle" cx="11" cy="11" r="8"/><line id="ss-search-icon-line" x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          id="ss-search-input"
          type="text"
          class="ss-search"
          [(ngModel)]="searchText"
          [ngModelOptions]="{standalone: true}"
          [placeholder]="'SEARCHABLE_SELECT.SEARCH' | translate"
          (click)="$event.stopPropagation()"
          autofocus />
      </div>

      <ul id="ss-list" class="ss-list">
        @for (item of filtered; track item.Value) {
          <li class="ss-item"
            [attr.id]="'ss-item-' + item.Value"
            [class.selected]="item.Value === selectedValue"
            (click)="select(item)">
            {{ item.Name }}
          </li>
        } @empty {
          <li id="ss-empty" class="ss-empty">{{ 'COMMON.NO_RESULTS' | translate }}</li>
        }
      </ul>
    </div>
  }

</div>
