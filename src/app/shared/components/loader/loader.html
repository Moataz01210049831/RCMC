@if (loader.isLoading()) {
  <div id="loader-overlay" class="loader-overlay">
    <div id="loader-spinner" class="loader-spinner">
      <svg id="loader-spinner-svg" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
        <circle id="loader-spinner-circle" cx="25" cy="25" r="20" fill="none" stroke-width="4" />
      </svg>
    </div>
  </div>
}
