<div id="dp-container" class="dp-container">

  <div id="dp-trigger" class="dp-trigger"
    [class.open]="isOpen"
    [class.invalid]="invalid"
    [class.has-value]="value"
    (click)="toggle()">

    @if (value) {
      <span id="dp-value" class="dp-value">{{ displayValue }}</span>
      <button id="dp-clear-btn" type="button" class="dp-clear" (click)="clear($event)">×</button>
    } @else {
      <span id="dp-placeholder" class="dp-placeholder">{{ placeholder || ('DATE_PICKER.CHOOSE_DATE' | translate) }}</span>
    }

    <svg class="dp-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
      fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="4" width="18" height="18" rx="2" />
      <line x1="16" y1="2" x2="16" y2="6" />
      <line x1="8" y1="2" x2="8" y2="6" />
      <line x1="3" y1="10" x2="21" y2="10" />
    </svg>
  </div>

  @if (isOpen) {
    <div id="dp-popup" class="dp-popup" (click)="$event.stopPropagation()">
      <div class="dp-header">
        <button type="button" class="dp-nav" (click)="prevMonth($event)" aria-label="prev">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </button>
        <span class="dp-month-label">{{ monthLabel }}</span>
        <button type="button" class="dp-nav" (click)="nextMonth($event)" aria-label="next">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="9 18 15 12 9 6" />
          </svg>
        </button>
      </div>

      <div class="dp-weekdays">
        @for (w of weekDays; track w) {
          <span class="dp-weekday">{{ w }}</span>
        }
      </div>

      <div class="dp-grid">
        @for (cell of days; track cell.iso) {
          <button type="button" class="dp-day"
            [class.muted]="!cell.inMonth"
            [class.today]="cell.isToday"
            [class.selected]="cell.isSelected"
            [class.disabled]="cell.isDisabled"
            [disabled]="cell.isDisabled"
            (click)="selectDay(cell, $event)">
            {{ cell.date }}
          </button>
        }
      </div>
    </div>
  }

</div>
