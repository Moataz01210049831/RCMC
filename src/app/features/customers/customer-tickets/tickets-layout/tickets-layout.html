@if (customer(); as c) {
  <div id="tickets-layout-page" class="tickets-page">

    <app-customer-card
      [customer]="c"
      (edit)="editCustomer()"
      (addEntity)="addEntity()"
    />

    <div id="tickets-layout-body" class="tickets-body">

      <!-- Left: projected content -->
      <div id="tickets-layout-content" class="tickets-content">
        <ng-content />
      </div>

      <!-- Right: tabs + list -->
      <aside id="tickets-layout-sidebar" class="tickets-sidebar">
        <h3 id="tickets-layout-sidebar-title" class="sidebar-title">{{ 'TICKETS.TICKETS' | translate }}</h3>

        <div id="tickets-layout-sidebar-search" class="sidebar-search">
          <svg id="tickets-layout-search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle id="tickets-layout-search-icon-circle" cx="11" cy="11" r="8"/>
            <line id="tickets-layout-search-icon-line" x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input id="tickets-layout-search-input" type="text" [placeholder]="'TICKETS.SEARCH' | translate"
            [value]="searchTerm()" (input)="onSearchInput($event)" />
        </div>

        <div id="tickets-layout-sidebar-tabs" class="sidebar-tabs">
          @for (tab of tabs; track tab.type) {
            <button id="tickets-layout-tab-{{ tab.type }}" type="button" class="sidebar-tab"
              [class.active]="activeType() === tab.type"
              (click)="selectTab(tab.type)">
              {{ tab.labelKey | translate }}
            </button>
          }
        </div>

        <div id="tickets-layout-list-header" class="list-header">
          <h4 id="tickets-layout-list-heading" class="list-heading">{{ activeTabLabel() | translate }}</h4>
          <button id="tickets-layout-btn-add" type="button" class="btn-add" (click)="onAdd()">
            <span id="tickets-layout-btn-add-plus" class="plus">+</span>
            {{ addLabel() | translate }}
          </button>
        </div>

        <div id="tickets-layout-ticket-list" class="ticket-list">
          @for (t of tickets(); track t.code) {
            <button [attr.id]="'tickets-layout-ticket-' + t.code" type="button" class="ticket-item"
              [class.active]="(activeTicket()?.code) === t.code"
              (click)="selectTicket(t.code)">
              <span [attr.id]="'tickets-layout-ticket-code-' + t.code" class="ticket-code">{{ t.code }}</span>
              <span [attr.id]="'tickets-layout-ticket-status-' + t.code" class="ticket-status">
                <span class="status-dot" [attr.id]="'tickets-layout-ticket-status-dot-' + t.code"></span>
                {{ t.statusKey | translate }}
              </span>
              <svg [attr.id]="'tickets-layout-ticket-arrow-' + t.code" class="arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
            </button>
          }
        </div>
      </aside>

    </div>

    <!-- <button class="btn-back" (click)="goBack()">
      {{ 'COMMON.BACK' | translate }}
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button> -->

  </div>
}
