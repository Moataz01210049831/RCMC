<app-tickets-layout
  (activeTicketChange)="onActiveTicketChange($event)"
  (addClick)="onAddClick($event)"
  (tabChange)="onTabChange($event)">

  @if (mode() === 'add') {
    @switch (activeType()) {
      @case ('complaints') {
        <app-add-complaint
          [contactId]="contactId"
          [commercialRecord]="commercialRecord()"
          [relatedContext]="relatedContext()"
          (cancel)="cancelAdd()"
          (submitted)="onComplaintSubmitted($event)" />
      }
      @case ('requests') {
        <app-add-request (cancel)="cancelAdd()" (submitted)="onAddSubmitted()" />
      }
      @case ('inquiries') {
        <app-add-inquiry (cancel)="cancelAdd()" (submitted)="onAddSubmitted()" />
      }
      @case ('suggestions') {
        <app-add-suggestion (cancel)="cancelAdd()" (submitted)="onAddSubmitted()" />
      }
    }
  } @else {
    <app-complaint-detail [ticket]="activeTicket()" />
  }

</app-tickets-layout>

<app-confirm-dialog
  [open]="showConfirm()"
  [title]="confirmTitleKey() | translate"
  [message]="confirmMessageKey() | translate"
  (confirm)="onConfirmSave()"
  (cancel)="onCancelConfirm()" />
