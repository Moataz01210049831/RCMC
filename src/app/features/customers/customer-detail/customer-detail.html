@if (customer(); as c) {
  <div id="customer-detail-page" class="detail-page">

    <app-customer-card
      [customer]="c"
      (edit)="edit()"
      (addEntity)="addEntity()"
    />

    <app-related-entities />

    <button id="customer-detail-btn-back" class="btn-back" (click)="goBack()">
      {{ 'common.back' | translate }}
      <svg id="customer-detail-back-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2">
        <polyline id="customer-detail-back-icon-polyline" points="15 18 9 12 15 6"/>
      </svg>
    </button>

  </div>
}
